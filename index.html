<html lang="es">
<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231f6392'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3EG%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
    body{font-family:'Inter',sans-serif;background:#f5f7fc;color:#0a1c2f;padding:1rem}
    .store-wrapper{max-width:1300px;margin:0 auto}
    .announcement-bar{background:#0f2b4d;color:#fff;padding:0.45rem 1.2rem;border-radius:2.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;font-weight:500;font-size:0.85rem}
    .announcement-bar a{color:#f9b43a;text-decoration:none;font-weight:700;background:rgba(255,255,255,0.1);padding:0.25rem 1rem;border-radius:2rem;transition:0.2s;border:1px solid rgba(255,255,255,0.15)}
    .announcement-bar a:hover{background:#f9b43a;color:#0f2b4d}
    .logo-banner{background:linear-gradient(135deg,#0a2a3b 0%,#1c5a7a 100%);border-radius:1.4rem;margin-bottom:1.5rem;overflow:hidden;box-shadow:0 8px 18px -8px rgba(0,0,0,0.1)}
    .logo-area{display:flex;align-items:center;gap:0.8rem;padding:1rem 1.5rem;background:rgba(255,255,255,0.05);backdrop-filter:blur(2px);border-bottom:1px solid rgba(255,255,255,0.15)}
    .logo-icon{background:#fff;width:48px;height:48px;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#1c5a7a;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
    .logo-text h1{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-0.2px;line-height:1.2}
    .logo-text p{color:rgba(255,255,255,0.8);font-size:0.75rem}
    .banner{background:linear-gradient(95deg,#f9b43a 0%,#fb6b2b 100%);padding:1.2rem 1.8rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.8rem}
    .banner h2{color:#1e2a2f;font-weight:800;font-size:1.3rem}
    .banner p{font-weight:500;color:#2c2c2c;font-size:0.9rem}
    .banner-tag{background:rgba(0,0,0,0.2);padding:0.3rem 0.9rem;border-radius:2.5rem;color:#fff;font-weight:600;font-size:0.85rem}
    .top-bar{display:flex;justify-content:flex-end;margin-bottom:1.2rem}
    .cart-summary{background:#fff;padding:0.45rem 1.2rem;border-radius:2.5rem;display:flex;align-items:center;gap:0.8rem;font-weight:600;font-size:0.85rem;box-shadow:0 2px 6px rgba(0,0,0,0.02)}
    .cart-summary i{font-size:1.2rem;color:#1f6392}
    .cart-badge{background:#1f6392;color:#fff;border-radius:2rem;padding:0.15rem 0.6rem;font-size:0.75rem}
    .shop-grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem}
    .products-container{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px,1fr));gap:1.2rem}
    .product-card{background:#fff;border-radius:1.2rem;overflow:hidden;transition:0.15s;box-shadow:0 4px 10px rgba(0,0,0,0.02);border:1px solid #eef2f8;display:flex;flex-direction:column}
    .product-card:hover{transform:translateY(-3px);box-shadow:0 12px 22px -10px rgba(0,0,0,0.1)}
    .product-info{padding:1.1rem 1rem 1.2rem}
    .product-title{font-weight:700;font-size:0.9rem;margin-bottom:0.3rem;line-height:1.25}
    .product-price{font-weight:800;font-size:1.2rem;color:#1f6392;margin:0.5rem 0}
    .card-buttons{display:flex;gap:0.5rem}
    .btn-add,.btn-details{flex:1;border:none;padding:0.55rem 0;border-radius:2rem;font-weight:600;font-size:0.75rem;cursor:pointer;transition:0.15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
    .btn-add{background:#0f2b4d;color:#fff}
    .btn-add:hover{background:#1f4b6e}
    .btn-details{background:#eef2fa;color:#1f6392}
    .cart-sidebar{background:#fff;border-radius:1.2rem;padding:1rem;box-shadow:0 6px 14px rgba(0,0,0,0.03);position:sticky;top:1rem;align-self:start;max-height:85vh;display:flex;flex-direction:column;border:1px solid #eef2f8}
    .cart-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid #eef2f8;padding-bottom:0.6rem;margin-bottom:0.8rem}
    .cart-header h3{font-size:1.1rem;font-weight:700;display:flex;gap:0.4rem;align-items:center}
    .clear-cart{background:none;border:none;color:#d9534f;font-size:0.7rem;font-weight:500;cursor:pointer}
    .cart-list{flex:1;overflow-y:auto;max-height:52vh;margin-bottom:0.8rem;padding-right:0.2rem}
    .cart-item{display:flex;gap:10px;background:#fafdff;border-radius:0.9rem;padding:0.6rem;margin-bottom:0.7rem;border:1px solid #eef2f8;align-items:center}
    .cart-item-details{flex:1}
    .cart-item-name{font-weight:600;font-size:0.8rem;line-height:1.2}
    .cart-item-price{font-size:0.7rem;color:#1f6392;font-weight:600}
    .cart-qty-control{display:flex;align-items:center;gap:6px;margin-top:4px}
    .qty-btn{background:#eef2f8;border:none;width:22px;height:22px;border-radius:30px;font-weight:bold;cursor:pointer;font-size:0.9rem;line-height:1}
    .cart-item-qty{font-weight:600;font-size:0.75rem}
    .remove-item-btn{background:none;border:none;color:#d9534f;font-size:0.7rem;margin-left:4px;cursor:pointer}
    .cart-total{border-top:1.5px dashed #e2eaf1;padding-top:0.7rem;display:flex;justify-content:space-between;font-weight:800;font-size:1rem;margin:0.4rem 0}
    .checkout-wa{background:#25D366;color:#fff;border:none;width:100%;padding:0.7rem;border-radius:2.2rem;font-weight:700;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.15s}
    .checkout-wa:hover{background:#128C7E}
    .empty-cart-msg{text-align:center;color:#6c819e;padding:1.2rem 0;font-size:0.8rem}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
    .modal-content{background:#fff;max-width:500px;width:90%;border-radius:1.8rem;padding:1.3rem;max-height:80vh;overflow-y:auto;animation:fadeUp 0.15s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    .modal-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eef2f8;padding-bottom:0.5rem;margin-bottom:1rem}
    .modal-header h2{font-size:1.2rem;font-weight:700}
    .close-modal{background:none;border:none;font-size:1.8rem;cursor:pointer;line-height:1}
    .modal-body{font-size:0.85rem;line-height:1.45;color:#1e2f3f}
    .modal-add{margin-top:1rem;background:#0f2b4d;color:#fff;border:none;padding:0.6rem;border-radius:2rem;font-weight:600;width:100%;cursor:pointer;font-size:0.85rem}
    .watermark{position:fixed;bottom:16px;right:16px;font-size:2.2rem;font-weight:800;color:rgba(15,43,77,0.1);pointer-events:none;z-index:999;transform:rotate(-5deg);letter-spacing:5px;white-space:nowrap}

      .cart-sidebar{position:static;max-height:none}
      .logo-text h1{font-size:1.1rem}
      .banner h2{font-size:1.1rem}
      .watermark{font-size:1.8rem;bottom:10px;right:10px}
    }
  </style>
</head>

  ];

  let cart=[];
  const saveCart=()=>localStorage.setItem("gv_cart",JSON.stringify(cart));
  const loadCart=()=>{try{let s=localStorage.getItem("gv_cart");cart=s?JSON.parse(s):[];if(!Array.isArray(cart))cart=[]}catch{cart=[]};renderCart();updateCount()};
  const updateCount=()=>document.getElementById("cartGlobalCount").innerText=cart.reduce((s,i)=>s+i.quantity,0);
  const totalCart=()=>cart.reduce((s,i)=>s+(i.price*i.quantity),0);

  function addToCart(id){
    let p=PRODUCTS.find(x=>x.id===id); if(!p)return;
    let exist=cart.find(i=>i.id===id);
    exist?exist.quantity++:cart.push({id:p.id,name:p.name,price:p.price,quantity:1});
    saveCart();renderCart();updateCount();toast(`✓ ${p.name.substring(0,28)} agregado`);
  }
  function updateQty(id,d){
    let idx=cart.findIndex(i=>i.id===id); if(idx===-1)return;
    let q=cart[idx].quantity+d;
    q<=0?cart.splice(idx,1):cart[idx].quantity=q;
    saveCart();renderCart();updateCount();
  }
  function removeItem(id){cart=cart.filter(i=>i.id!==id);saveCart();renderCart();updateCount();toast("Producto eliminado")}
  function clearCart(){if(!cart.length)return;cart=[];saveCart();renderCart();updateCount();toast("Carrito vaciado")}

  function renderCart(){
    let c=document.getElementById("cartItemsList"), t=document.getElementById("cartTotalPrice");
    if(!cart.length){c.innerHTML='<div class="empty-cart-msg">🛒 Tu carrito está vacío</div>';t.innerText="$0.00";return;}
    let h='';
    cart.forEach(i=>{h+=`<div class="cart-item"><div class="cart-item-details"><div class="cart-item-name">${i.name.substring(0,38)}</div><div class="cart-item-price">$${i.price} USD</div><div class="cart-qty-control"><button class="qty-btn decQty" data-id="${i.id}">−</button><span class="cart-item-qty">${i.quantity}</span><button class="qty-btn incQty" data-id="${i.id}">+</button><button class="remove-item-btn" data-id="${i.id}"><i class="fas fa-trash-can"></i></button></div></div></div>`});
    c.innerHTML=h; t.innerText=`$${totalCart().toFixed(2)} USD`;
    c.querySelectorAll('.decQty').forEach(b=>b.addEventListener('click',()=>updateQty(b.dataset.id,-1)));
    c.querySelectorAll('.incQty').forEach(b=>b.addEventListener('click',()=>updateQty(b.dataset.id,1)));
    c.querySelectorAll('.remove-item-btn').forEach(b=>b.addEventListener('click',()=>removeItem(b.dataset.id)));
  }

  function toast(m){
    let d=document.createElement('div'); d.innerText=m; d.style.position='fixed'; d.style.bottom='20px'; d.style.left='50%'; d.style.transform='translateX(-50%)';
    d.style.background='#1e2f3f'; d.style.color='#fff'; d.style.padding='6px 18px'; d.style.borderRadius='30px'; d.style.fontSize='0.8rem'; d.style.zIndex='1200'; d.style.fontWeight='500';
    document.body.appendChild(d); setTimeout(()=>{d.style.opacity='0'; setTimeout(()=>d.remove(),200)},1600);
  }

  function renderProducts(){
    let g=document.getElementById('productsGrid'); g.innerHTML='';
    PRODUCTS.forEach(p=>{
      let c=document.createElement('div'); c.className='product-card';
      c.innerHTML=`<div class="product-info"><div class="product-title">${p.name}</div><div class="product-price">$${p.price} USD</div><div class="card-buttons"><button class="btn-add" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Comprar</button><button class="btn-details" data-id="${p.id}"><i class="fas fa-info-circle"></i> Detalles</button></div></div>`;
      g.appendChild(c);
    });
    document.querySelectorAll('.btn-add').forEach(b=>b.addEventListener('click',()=>addToCart(b.dataset.id)));
    document.querySelectorAll('.btn-details').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.id)));
  }

  let curId=null;
  function openModal(id){
    let p=PRODUCTS.find(x=>x.id===id); if(!p)return; curId=id;
    document.getElementById('modalTitle').innerHTML=p.name;
    document.getElementById('modalBody').innerHTML=`<div style="white-space:pre-wrap">${p.fullDescription}</div>`;
    document.getElementById('productModal').style.display='flex';
  }
  function closeModal(){document.getElementById('productModal').style.display='none';curId=null;}
  function sendWA(){
    if(!cart.length){toast("⚠️ Carrito vacío");return;}
    let t="🛍️ *NUEVO PEDIDO - GESTORES DE VENTA*%0A%0A📋 *PRODUCTOS:*%0A";
    cart.forEach(i=>t+=`• ${i.name} x${i.quantity} → $${(i.price*i.quantity).toFixed(2)} USD%0A`);
    t+=`%0A💰 *TOTAL: $${totalCart().toFixed(2)} USD*%0A%0A🚚 Envío incluido%0A💳 Pago: USD / Zelle%0A%0A📦 *Datos de envío:* (Nombre y dirección)%0A✅ Confirmar pedido.`;
    window.open(`https://wa.me/5356962235?text=${t}`,'_blank');
  }

  document.getElementById('clearCartBtn').addEventListener('click',()=>{if(cart.length&&confirm('¿Vaciar carrito?'))clearCart(); else if(!cart.length)toast('Carrito vacío');});
  document.getElementById('checkoutWhatsAppBtn').addEventListener('click',sendWA);
  document.getElementById('closeModalBtn').addEventListener('click',closeModal);
  window.addEventListener('click',e=>{if(e.target===document.getElementById('productModal'))closeModal()});
  document.getElementById('modalAddToCartBtn').addEventListener('click',()=>{if(curId){addToCart(curId);closeModal()}});

  renderProducts();
  loadCart();
</script>
</body>
</html>
